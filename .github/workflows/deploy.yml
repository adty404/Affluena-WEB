name: Web CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: affluena-web-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Build Web
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate web env
        run: |
          test -n "$VITE_API_BASE_URL" || {
            echo "Missing VITE_API_BASE_URL variable or secret."
            exit 1
          }

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Package dist
        run: tar -C dist -czf affluena-web-dist.tar.gz .

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: affluena-web-dist
          path: affluena-web-dist.tar.gz
          retention-days: 1

  deploy:
    name: Deploy Web
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_DEPLOY_ROOT: ${{ secrets.VPS_DEPLOY_ROOT || '/opt/affluena' }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      RELEASE_ARCHIVE: /tmp/affluena-web-${{ github.sha }}.tar.gz

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: affluena-web-dist

      - name: Validate deploy secrets
        run: |
          test -n "$VPS_HOST" || { echo "Missing VPS_HOST secret"; exit 1; }
          test -n "$VPS_USER" || { echo "Missing VPS_USER secret"; exit 1; }
          test -n "$VPS_SSH_KEY" || { echo "Missing VPS_SSH_KEY secret"; exit 1; }

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload web artifact
        run: |
          scp -i ~/.ssh/deploy_key -P "$VPS_PORT" affluena-web-dist.tar.gz "$VPS_USER@$VPS_HOST:$RELEASE_ARCHIVE"

      - name: Publish web on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "DEPLOY_ROOT='$VPS_DEPLOY_ROOT' RELEASE_ARCHIVE='$RELEASE_ARCHIVE' bash -se" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_ROOT/Affluena-WEB"
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "Affluena-WEB has local tracked changes; refusing to deploy."
            git status --short --untracked-files=no
            exit 1
          fi

          git fetch origin master
          git checkout master
          git pull --ff-only origin master

          mkdir -p /srv/affluena/web
          tmp_dir="$(mktemp -d)"
          tar -xzf "$RELEASE_ARCHIVE" -C "$tmp_dir"
          find /srv/affluena/web -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -a "$tmp_dir"/. /srv/affluena/web/
          rm -rf "$tmp_dir" "$RELEASE_ARCHIVE"

          sudo -n nginx -t
          sudo -n systemctl reload nginx
          curl -fsS http://127.0.0.1/healthz
          REMOTE

  notify:
    name: Notify Telegram
    needs:
      - build
      - deploy
    if: always() && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BUILD_RESULT: ${{ needs.build.result }}
      DEPLOY_RESULT: ${{ needs.deploy.result }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Send Telegram notification
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured; skipping notification."
            exit 0
          fi

          status="SUCCESS"
          title="Affluena Web deploy selesai"
          if [ "$BUILD_RESULT" != "success" ] || [ "$DEPLOY_RESULT" != "success" ]; then
            status="FAILED"
            title="Affluena Web deploy gagal"
          fi

          short_sha="${GITHUB_SHA::7}"
          message="$(printf '[%s] %s\nRepository: %s\nBranch: %s\nCommit: %s\nBuild: %s\nDeploy: %s\nRun: %s\n' \
            "$status" "$title" "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "$short_sha" "$BUILD_RESULT" "$DEPLOY_RESULT" "$RUN_URL")"

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}"
